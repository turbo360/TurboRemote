name: TurboRemote
options:
  bundleIdPrefix: com.turboproductions
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  TurboRemote:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.turboproductions.turboremote
        MARKETING_VERSION: "1.0.4"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: TurboRemote.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: "YES"
        SWIFT_STRICT_CONCURRENCY: minimal
    entitlements:
      path: TurboRemote.entitlements
