name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Import signing certificate
        env:
          SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/signing_cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$SIGNING_CERT_P12" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$SIGNING_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Secrets.swift
        run: |
          cat > TurboRemote/Sources/App/Secrets.swift << 'SWIFT'
          enum Secrets {
              static let appPin = "${{ secrets.APP_PIN }}"
          }
          SWIFT

      - name: Generate Xcode Project
        working-directory: TurboRemote
        run: |
          xcodegen generate
          cat > TurboRemote.entitlements << 'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <false/>
          </dict>
          </plist>
          XML

      - name: Build
        working-directory: TurboRemote
        run: |
          xcodebuild -project TurboRemote.xcodeproj \
            -scheme TurboRemote \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="Developer ID Application: James Anderson (ETURVK9WSA)" \
            DEVELOPMENT_TEAM=ETURVK9WSA \
            CODE_SIGN_STYLE=Manual \
            build

      - name: Package DMG
        working-directory: TurboRemote
        run: |
          APP_PATH="build/Build/Products/Release/TurboRemote.app"
          DMG_NAME="TurboRemote-${GITHUB_REF_NAME}.dmg"
          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "TurboRemote" -srcfolder dmg_staging -ov -format UDZO "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: TurboRemote/${{ env.DMG_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
